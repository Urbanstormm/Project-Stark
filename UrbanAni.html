<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanAni</title>
    <meta name="description" content="UrbanAni — watch anime on Urbanstorm.uk">
    <script>
        // Replace YOUR_VPS_IP with your server IP (UrbanAni listens on port 43000)
        const URBANANI_URL = "http://78.108.218.85:43000";

        (function () {
            var meta = document.createElement("meta");
            meta.httpEquiv = "refresh";
            meta.content = "0; url=" + URBANANI_URL;
            document.head.appendChild(meta);
            window.location.replace(URBANANI_URL);
        })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070707;
            color: #f4f4f5;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        main {
            text-align: center;
            padding: 2rem;
            max-width: 28rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }
        h1 span { color: #6152df; }
        p {
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #6152df;
            color: #fff;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: background 0.15s ease;
        }
        a:hover { background: #4f43c4; }
    </style>
</head>
<body>
    <main>
        <h1><span>Urban</span>Ani</h1>
        <p>Redirecting you to UrbanAni…</p>
        <a id="urbanani-link" href="#">Continue to UrbanAni</a>
    </main>
    <script>
        document.getElementById("urbanani-link").href = URBANANI_URL;
    </script>
</body>
</html>
